<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Wipeout Gauntlet — AIWars</title>
  <style>
    :root { --base:#1a0820; --ink:#fff0f6; --muted:#d8a8c4; --A:#10b981; --B:#8b5cf6; --brand:#ff5db1; }
    html,body { margin:0; height:100%; background:var(--base); color:var(--ink);
      font-family:system-ui,"DejaVu Sans",sans-serif; }
    #wrap { max-width:820px; margin:0 auto; padding:10px; }
    h1 { font-size:18px; font-weight:800; margin:4px 2px 8px; }
    h1 .dot { color:var(--brand); }
    canvas { display:block; width:100%; height:auto; border-radius:12px; border:1px solid #ffffff1f;
      image-rendering:pixelated; box-shadow:0 20px 50px -28px #000; }
    #status { margin-top:8px; font-size:13px; color:var(--muted); min-height:18px; }
    .off { color:#ff7a9a; }
  </style>
</head>
<body>
  <div id="wrap">
    <h1>Wipeout Gauntlet <span class="dot">●</span> <span style="font-weight:500;color:var(--muted);font-size:13px">live referee view</span></h1>
    <canvas id="c" width="780" height="560"><title>Wipeout Gauntlet race</title></canvas>
    <div id="status">connecting…</div>
  </div>
  <script src="app.js"></script>
</body>
</html>
